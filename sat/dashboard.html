<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SAT Math Practice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3B82F6;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
    }

    [data-theme="dark"] {
      --text: #e2e8f0;
      --text-light: #cbd5e1;
      --text-muted: #94a3b8;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --border: #334155;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .back-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-light);
      font-size: 1rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      color: var(--text-light);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .topic-item {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .topic-item:last-child {
      border-bottom: none;
    }

    .topic-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .topic-name {
      font-weight: 600;
    }

    .topic-percentage {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
    }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* Mastery Cards */
    .mastery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .mastery-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .mastery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .mastery-title {
      font-weight: 700;
      font-size: 1rem;
    }

    .mastery-badge {
      font-size: 1.5rem;
    }

    .difficulty-pills {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .pill {
      flex: 1;
      text-align: center;
      padding: 0.75rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
    }

    .pill-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      display: block;
    }

    .pill-value {
      font-size: 1.25rem;
      font-weight: 700;
      display: block;
      margin-top: 0.25rem;
    }

    .pill-count {
      font-size: 0.75rem;
      color: var(--text-light);
      display: block;
      margin-top: 0.25rem;
    }

    /* Achievement Grid */
    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .achievement {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .achievement.unlocked {
      border-color: var(--primary);
      background: var(--bg-card);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
      transform: scale(1);
    }

    .achievement.locked {
      opacity: 0.4;
      filter: grayscale(100%);
      border-color: var(--border);
    }

    .achievement.unlocked:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }

    .achievement.locked:hover {
      opacity: 0.6;
    }

    .achievement-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .achievement-name {
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .achievement-desc {
      font-size: 0.875rem;
      color: var(--text-light);
    }

    .unlocked-badge {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.25rem 0.75rem;
      background: var(--primary);
      color: white;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .mastery-grid,
      .achievement-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div>
      <a href="index.html" class="back-link">← Back to Practice</a>
      <h1>📊 Your Progress Dashboard</h1>
      <p class="subtitle">Track your performance and mastery</p>
    </div>
  </div>

  <!-- Stats Overview -->
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value" id="statCorrect">0</div>
      <div class="stat-label">Problems Solved</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statAccuracy">0%</div>
      <div class="stat-label">Accuracy</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statStreak">0</div>
      <div class="stat-label">Current Streak</div>
    </div>
  </div>

  <!-- Topic Performance -->
  <div class="card">
    <h2 class="card-title">Topic Performance</h2>
    <div style="max-width: 400px; margin: 0 auto;">
      <canvas id="pieChart"></canvas>
    </div>
    <div id="topicList" style="margin-top: 1.5rem;">
      <p style="color: var(--text-light);">Loading...</p>
    </div>
  </div>

  <!-- Mastery Section -->
  <div class="card">
    <h2 class="card-title">🏆 Topic Mastery</h2>
    <div class="mastery-grid" id="masteryGrid">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Achievements -->
  <div class="card">
    <h2 class="card-title">🎖️ Achievements</h2>
    <p style="color: var(--text-light); font-size: 0.875rem; margin-bottom: 1rem;">
      Unlock achievements by solving problems! <span id="unlockedCount">0</span> / <span id="totalCount">0</span> unlocked
    </p>
    <div class="achievement-grid" id="achievementGrid">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Firebase -->
<script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Scripts -->
<script defer src="../shared/firebase-config.js"></script>
<script defer src="../shared/storage-manager.js"></script>
<script defer src="./mastery-achievement-system.js"></script>

<script>
  async function init() {
    console.log('Dashboard loading...');

    if (window.storage) {
      await storage.init();
    }

    updateStats();
    updateTopics();

    // Wait for mastery system
    if (window.MasterySystem && window.AchievementSystem) {
      updateMastery();
      updateAchievements();
    } else {
      setTimeout(() => {
        if (window.MasterySystem && window.AchievementSystem) {
          updateMastery();
          updateAchievements();
        }
      }, 500);
    }
  }

  function updateStats() {
    if (!storage) return;

    const stats = storage.getStats();

    document.getElementById('statCorrect').textContent = stats.correctAnswers || 0;
    document.getElementById('statAccuracy').textContent = (stats.accuracy || 0) + '%';
    document.getElementById('statStreak').textContent = stats.currentStreak || 0;
  }

  function updateTopics() {
    if (!storage) return;

    const progress = storage.getProgress();

    // Topic name mapping - extract from problem IDs
    const topicNames = {
      'LEQ1V': 'Linear Equations (1 Var)',
      'LEQFN': 'Linear Functions',
      'LEQ2V': 'Linear Equations (2 Vars)',
      'SYSLE': 'Systems of Equations',
      'LINIQ': 'Linear Inequalities',
      'NLFN': 'Nonlinear Functions',
      'NLEQ': 'Nonlinear Equations',
      'EQEXP': 'Equivalent Expressions'
    };

    const topics = {};

    // Extract topic from problem ID (e.g., "ALG-LEQ1V-E-001" -> "LEQ1V")
    Object.values(progress.problems || {}).forEach(p => {
      if (!p || !p.id) return;

      const parts = p.id.split('-');
      if (parts.length < 2) return;

      const topicCode = parts[1]; // Gets "LEQ1V", "LEQFN", etc.
      const topicName = topicNames[topicCode] || topicCode;

      if (!topics[topicName]) {
        topics[topicName] = { correct: 0, total: 0 };
      }

      topics[topicName].total++;
      if (p.correct) topics[topicName].correct++;
    });

    const container = document.getElementById('topicList');

    if (Object.keys(topics).length === 0) {
      container.innerHTML = '<p style="color: var(--text-light);">No data yet. Start practicing!</p>';
      const chartCanvas = document.getElementById('pieChart');
      if (chartCanvas) chartCanvas.parentElement.style.display = 'none';
      return;
    }

    // Create pie chart
    const canvas = document.getElementById('pieChart');
    if (canvas) {
      const ctx = canvas.getContext('2d');

      const colors = ['#3B82F6', '#8B5CF6', '#EC4899', '#F59E0B', '#10B981', '#EF4444', '#06B6D4', '#F43F5E'];

      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: Object.keys(topics),
          datasets: [{
            data: Object.values(topics).map(t => t.total),
            backgroundColor: colors,
            borderWidth: 2,
            borderColor: '#ffffff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                padding: 15,
                font: { size: 12, weight: 'bold' }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const topic = Object.entries(topics)[context.dataIndex];
                  const percentage = Math.round((topic[1].correct / topic[1].total) * 100);
                  return [
                    `${context.label}`,
                    `Accuracy: ${percentage}%`,
                    `${topic[1].correct}/${topic[1].total} correct`
                  ];
                }
              }
            }
          }
        }
      });
    }

    // Create list
    container.innerHTML = Object.entries(topics).map(([name, data]) => {
      const percentage = Math.round((data.correct / data.total) * 100);
      return `
            <div class="topic-item">
                <div class="topic-header">
                    <span class="topic-name">${name}</span>
                    <span class="topic-percentage">${percentage}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${percentage}%"></div>
                </div>
                <div style="font-size: 0.875rem; color: var(--text-light); margin-top: 0.25rem;">
                    ${data.correct} / ${data.total} correct
                </div>
            </div>
        `;
    }).join('');
  }

  function updateMastery() {
    if (!window.MasterySystem) return;

    const topics = [
      { id: 'linear-equations-one-variable', name: 'Linear Equations (1 Var)' },
      { id: 'linear-functions', name: 'Linear Functions' },
      { id: 'systems-linear-equations', name: 'Systems of Equations' }
    ];

    const grid = document.getElementById('masteryGrid');

    grid.innerHTML = topics.map(topic => {
      const mastery = MasterySystem.getTopicMastery(topic.id);
      const badge = MasterySystem.getBadge(mastery.level);
      const color = MasterySystem.getColor(mastery.level);
      const levelName = MasterySystem.getLevelName(mastery.level);

      return `
            <div class="mastery-card">
                <div class="mastery-header">
                    <span class="mastery-title">${topic.name}</span>
                    <span class="mastery-badge" style="color: ${color}">${badge}</span>
                </div>
                <div style="color: ${color}; font-weight: 600; margin-bottom: 0.5rem;">
                    ${levelName}
                </div>
                <div style="font-size: 0.875rem; color: var(--text-light);">
                    ${mastery.count} mastered
                </div>
                <div class="difficulty-pills">
                    <div class="pill">
                        <span class="pill-label">Easy</span>
                        <span class="pill-value" style="color: ${MasterySystem.getColor(mastery.easy.level)}">
                            ${MasterySystem.getBadge(mastery.easy.level)}
                        </span>
                        <span class="pill-count">${mastery.easy.count}</span>
                    </div>
                    <div class="pill">
                        <span class="pill-label">Medium</span>
                        <span class="pill-value" style="color: ${MasterySystem.getColor(mastery.medium.level)}">
                            ${MasterySystem.getBadge(mastery.medium.level)}
                        </span>
                        <span class="pill-count">${mastery.medium.count}</span>
                    </div>
                    <div class="pill">
                        <span class="pill-label">Hard</span>
                        <span class="pill-value" style="color: ${MasterySystem.getColor(mastery.hard.level)}">
                            ${MasterySystem.getBadge(mastery.hard.level)}
                        </span>
                        <span class="pill-count">${mastery.hard.count}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
  }

  function updateAchievements() {
    if (!window.AchievementSystem) return;

    // Get ALL achievements
    const allAchievements = AchievementSystem.achievements;
    const unlocked = AchievementSystem.getUnlocked();
    const unlockedIds = new Set(unlocked.map(a => a.id));

    document.getElementById('unlockedCount').textContent = unlocked.length;
    document.getElementById('totalCount').textContent = allAchievements.length;

    const grid = document.getElementById('achievementGrid');

    // Show ALL achievements - unlocked first, then locked
    const sortedAchievements = [
      ...allAchievements.filter(a => unlockedIds.has(a.id)),
      ...allAchievements.filter(a => !unlockedIds.has(a.id))
    ];

    grid.innerHTML = sortedAchievements.map(a => {
      const isUnlocked = unlockedIds.has(a.id);

      return `
            <div class="achievement ${isUnlocked ? 'unlocked' : 'locked'}">
                <div class="achievement-icon">${a.icon}</div>
                <div class="achievement-name">${a.name}</div>
                <div class="achievement-desc">${a.description}</div>
                ${isUnlocked ? '<div class="unlocked-badge">Unlocked!</div>' : ''}
            </div>
        `;
    }).join('');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>

</body>
</html>
