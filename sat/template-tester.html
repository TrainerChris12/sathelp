<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic & Difficulty Problem Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
            background: #f5f5f5;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 200px;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:hover {
            border-color: #0066b3;
        }

        select:focus {
            outline: none;
            border-color: #0066b3;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            align-self: flex-end;
        }

        .btn-primary {
            background: #0066b3;
            color: white;
        }

        .btn-primary:hover {
            background: #0052a3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 102, 179, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .debug-info {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .debug-info strong {
            color: #856404;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #0066b3;
        }

        .stat-label {
            font-size: 12px;
            color: #555;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .problem-display {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 25px;
            background: #fafafa;
            margin-bottom: 20px;
        }

        .problem-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .problem-id {
            font-weight: 600;
            color: #0066b3;
            font-size: 14px;
        }

        .difficulty-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .difficulty-badge.easy {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-badge.medium {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty-badge.hard {
            background: #f8d7da;
            color: #721c24;
        }

        .problem-question {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .problem-choices {
            margin-bottom: 20px;
        }

        .choice {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .choice.correct {
            background: #d4edda;
            border-color: #28a745;
            font-weight: 600;
        }

        .problem-answer {
            margin-top: 20px;
            padding: 15px;
            background: #d4edda;
            border-left: 4px solid #28a745;
            border-radius: 4px;
        }

        .problem-answer strong {
            color: #155724;
        }

        .problem-explanation {
            margin-top: 15px;
            padding: 15px;
            background: #e7f3ff;
            border-left: 4px solid #0066b3;
            border-radius: 4px;
            font-size: 14px;
            color: #004085;
        }

        .batch-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .batch-controls input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            width: 100px;
            font-size: 14px;
        }

        .batch-controls label {
            font-weight: normal;
            color: #666;
        }

        .error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            border-left-width: 4px;
            padding: 15px;
            border-radius: 6px;
            color: #721c24;
            margin-bottom: 20px;
        }

        .keyboard-hint {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 6px;
            font-size: 13px;
            color: #495057;
        }

        .keyboard-hint kbd {
            background: #fff;
            border: 1px solid #adb5bd;
            border-radius: 3px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 12px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #0066b3;
            color: white;
            border-color: #0066b3;
        }

        .mode-btn:hover:not(.active) {
            border-color: #0066b3;
        }

        .template-count {
            background: #e3f2fd;
            padding: 10px 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
            color: #0066b3;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Topic & Difficulty Problem Tester</h1>
    <p class="subtitle">Test problems by topic, difficulty level, and specific templates</p>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('topic')" id="modeTopicBtn">
            📚 Test by Topic & Difficulty
        </button>
        <button class="mode-btn" onclick="setMode('template')" id="modeTemplateBtn">
            🔬 Test Individual Template
        </button>
    </div>

    <div id="debugInfo" class="debug-info"></div>

    <!-- Topic/Difficulty Mode Controls -->
    <div class="controls" id="topicControls">
        <div class="control-group">
            <label for="topicSelect">Topic / Subskill:</label>
            <select id="topicSelect">
                <option value="">-- Select Topic --</option>
            </select>
            <div class="template-count" id="templateCount"></div>
        </div>

        <div class="control-group">
            <label for="difficultySelect">Difficulty:</label>
            <select id="difficultySelect">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div class="control-group">
            <label for="specificTemplate">Specific Template (Optional):</label>
            <select id="specificTemplate">
                <option value="">All Templates (Random)</option>
            </select>
        </div>

        <div class="control-group">
            <label>&nbsp;</label>
            <button class="btn btn-primary" onclick="generateProblem()">Generate Problem</button>
        </div>
    </div>

    <!-- Template Mode Controls (hidden by default) -->
    <div class="controls" id="templateControls" style="display: none;">
        <div class="control-group">
            <label for="templateTopicSelect">Topic:</label>
            <select id="templateTopicSelect">
                <option value="">-- Select Topic --</option>
            </select>
        </div>

        <div class="control-group">
            <label for="templateSelect">Template:</label>
            <select id="templateSelect">
                <option value="">-- Select Template --</option>
            </select>
        </div>

        <div class="control-group">
            <label>&nbsp;</label>
            <button class="btn btn-primary" onclick="generateTemplateMode()">Generate Problem</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-number" id="statGenerated">0</div>
            <div class="stat-label">Problems Generated</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="statEasy">0</div>
            <div class="stat-label">Easy</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="statMedium">0</div>
            <div class="stat-label">Medium</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="statHard">0</div>
            <div class="stat-label">Hard</div>
        </div>
    </div>

    <div class="batch-controls">
        <label>
            <input type="number" id="batchCount" min="1" max="50" value="10" placeholder="Count">
            problems
        </label>
        <button class="btn btn-primary" onclick="generateBatch()">Generate Batch</button>
        <button class="btn btn-primary" onclick="clearResults()">Clear All</button>
    </div>

    <div id="problemsContainer"></div>

    <div class="keyboard-hint">
        <strong>Keyboard Shortcuts:</strong>
        <kbd>Space</kbd> Generate •
        <kbd>B</kbd> Batch (10) •
        <kbd>C</kbd> Clear •
        <kbd>M</kbd> Toggle Mode
    </div>
</div>

<!-- Load problem generator and all templates -->
<script defer src="./problem-generator.js"></script>

<!-- Load all generator files -->
<script defer src="./generators/algebra/linearEqOneVar/easy.js"></script>
<script defer src="./generators/algebra/linearEqOneVar/medium.js"></script>
<script defer src="./generators/algebra/linearEqOneVar/hard.js"></script>
<script defer src="./generators/algebra/linearEqOneVar/register.js"></script>

<script defer src="./generators/algebra/linearFunctions/easy.js"></script>
<script defer src="./generators/algebra/linearFunctions/medium.js"></script>
<script defer src="./generators/algebra/linearFunctions/register.js"></script>

<script defer src="./generators/algebra/linearEqTwoVar/easy.js"></script>
<script defer src="./generators/algebra/linearEqTwoVar/medium.js"></script>
<script defer src="./generators/algebra/linearEqTwoVar/register.js"></script>

<script defer src="./generators/algebra/systemsOfTwoLinEq/easy.js"></script>
<script defer src="./generators/algebra/systemsOfTwoLinEq/medium.js"></script>
<script defer src="./generators/algebra/systemsOfTwoLinEq/hard.js"></script>
<script defer src="./generators/algebra/systemsOfTwoLinEq/register.js"></script>

<script defer src="./problem-generator-bootstrap.js"></script>

<script>
    let currentMode = 'topic';
    let currentTopic = '';
    let currentDifficulty = 'easy';
    let currentTemplate = '';
    let problemStats = { total: 0, easy: 0, medium: 0, hard: 0 };

    // Initialize on page load
    window.addEventListener('load', () => {
        setTimeout(() => {
            populateTopics();
            updateDebugInfo();
        }, 500);
    });

    function setMode(mode) {
        currentMode = mode;

        document.getElementById('modeTopicBtn').classList.toggle('active', mode === 'topic');
        document.getElementById('modeTemplateBtn').classList.toggle('active', mode === 'template');

        document.getElementById('topicControls').style.display = mode === 'topic' ? 'grid' : 'none';
        document.getElementById('templateControls').style.display = mode === 'template' ? 'grid' : 'none';

        if (mode === 'template') {
            populateTemplateMode();
        }
    }

    function populateTopics() {
        const topicSelect = document.getElementById('topicSelect');
        topicSelect.innerHTML = '<option value="">-- Select Topic --</option>';

        if (!window.ProblemGenerator || !window.ProblemGenerator._pools) {
            showError('ProblemGenerator._pools not found!');
            return;
        }

        const pools = window.ProblemGenerator._pools;
        const topics = Object.keys(pools);

        topics.forEach(topic => {
            const option = document.createElement('option');
            option.value = topic;
            option.textContent = formatTopicName(topic);
            topicSelect.appendChild(option);
        });

        if (topics.length === 1) {
            topicSelect.value = topics[0];
            onTopicChange();
        }
    }

    function populateTemplateMode() {
        const topicSelect = document.getElementById('templateTopicSelect');
        topicSelect.innerHTML = '<option value="">-- Select Topic --</option>';

        const pools = window.ProblemGenerator._pools;
        const topics = Object.keys(pools);

        topics.forEach(topic => {
            const option = document.createElement('option');
            option.value = topic;
            option.textContent = formatTopicName(topic);
            topicSelect.appendChild(option);
        });
    }

    function onTemplateTopicChange() {
        const topicSelect = document.getElementById('templateTopicSelect');
        const topic = topicSelect.value;

        const templateSelect = document.getElementById('templateSelect');
        templateSelect.innerHTML = '<option value="">-- Select Template --</option>';

        if (!topic) return;

        const pools = window.ProblemGenerator._pools[topic];
        if (!pools) return;

        const allTemplates = [
            ...(pools.easy || []),
            ...(pools.medium || []),
            ...(pools.hard || [])
        ];

        const uniqueTemplates = [...new Set(allTemplates)];

        uniqueTemplates.forEach(template => {
            const option = document.createElement('option');
            option.value = template;
            option.textContent = template;
            templateSelect.appendChild(option);
        });
    }

    function onTopicChange() {
        const topicSelect = document.getElementById('topicSelect');
        currentTopic = topicSelect.value;

        updateSpecificTemplateDropdown();
        updateTemplateCount();
        updateDebugInfo();
    }

    function onDifficultyChange() {
        const difficultySelect = document.getElementById('difficultySelect');
        currentDifficulty = difficultySelect.value;

        updateSpecificTemplateDropdown();
        updateTemplateCount();
        updateDebugInfo();
    }

    function updateSpecificTemplateDropdown() {
        const specificTemplate = document.getElementById('specificTemplate');
        specificTemplate.innerHTML = '<option value="">All Templates (Random)</option>';

        if (!currentTopic || !currentDifficulty) return;

        const pools = window.ProblemGenerator._pools[currentTopic];
        if (!pools) return;

        const templates = pools[currentDifficulty] || [];

        templates.forEach(template => {
            const option = document.createElement('option');
            option.value = template;
            option.textContent = template;
            specificTemplate.appendChild(option);
        });
    }

    function updateTemplateCount() {
        const countDiv = document.getElementById('templateCount');

        if (!currentTopic || !currentDifficulty) {
            countDiv.textContent = '';
            return;
        }

        const pools = window.ProblemGenerator._pools[currentTopic];
        if (!pools) {
            countDiv.textContent = '';
            return;
        }

        const templates = pools[currentDifficulty] || [];
        countDiv.textContent = `📝 ${templates.length} ${currentDifficulty} template${templates.length !== 1 ? 's' : ''} available`;
    }

    function updateDebugInfo() {
        const debugDiv = document.getElementById('debugInfo');

        if (!window.ProblemGenerator || !window.ProblemGenerator._pools) {
            debugDiv.innerHTML = '<strong>❌ ProblemGenerator not loaded</strong>';
            return;
        }

        const pools = window.ProblemGenerator._pools;
        const topics = Object.keys(pools);

        let html = `<strong>📊 Available Topics:</strong> ${topics.length}<br>`;

        topics.forEach(topic => {
            const pool = pools[topic];
            const easyCount = (pool.easy || []).length;
            const mediumCount = (pool.medium || []).length;
            const hardCount = (pool.hard || []).length;
            html += `<br>• <strong>${formatTopicName(topic)}:</strong> E=${easyCount} M=${mediumCount} H=${hardCount}`;
        });

        if (currentTopic) {
            html += `<br><br><strong>🎯 Current:</strong> ${formatTopicName(currentTopic)} → ${currentDifficulty}`;
        }

        debugDiv.innerHTML = html;
    }

    function formatTopicName(topic) {
        return topic
            .split('-')
            .map(word => word.charAt(0).toUpperCase() + word.slice(1))
            .join(' ');
    }

    function generateProblem() {
        if (!currentTopic) {
            showError('Please select a topic!');
            return;
        }

        const specificTemplate = document.getElementById('specificTemplate').value;

        try {
            const original = {
                id: 'TEST-' + Math.random().toString(36).substr(2, 9),
                topic: 'algebra',
                subskill: currentTopic,
                difficulty: currentDifficulty
            };

            let problem = null;

            if (specificTemplate) {
                // Generate from specific template
                const P = window.ProblemGenerator.prototype;
                const templateFn = P[specificTemplate] || window.ProblemGenerator.templates[specificTemplate];

                if (typeof templateFn !== 'function') {
                    showError(`Template "${specificTemplate}" not found!`);
                    return;
                }

                problem = templateFn.call(window.problemGenerator, original);
            } else {
                // Generate using normal flow (random template)
                problem = window.problemGenerator.generate(original);
            }

            if (!problem) {
                showError(`Failed to generate problem for ${currentTopic} (${currentDifficulty})`);
                return;
            }

            problemStats.total++;
            problemStats[currentDifficulty]++;
            updateStats();

            displayProblem(problem, problemStats.total);

        } catch (error) {
            showError(`Error generating problem: ${error.message}`);
            console.error(error);
        }
    }

    function generateTemplateMode() {
        const topicSelect = document.getElementById('templateTopicSelect');
        const templateSelect = document.getElementById('templateSelect');

        const topic = topicSelect.value;
        const template = templateSelect.value;

        if (!topic || !template) {
            showError('Please select both topic and template!');
            return;
        }

        try {
            const original = {
                id: 'TEST-' + Math.random().toString(36).substr(2, 9),
                topic: 'algebra',
                subskill: topic,
                difficulty: 'easy' // Default for template mode
            };

            const P = window.ProblemGenerator.prototype;
            const templateFn = P[template] || window.ProblemGenerator.templates[template];

            if (typeof templateFn !== 'function') {
                showError(`Template "${template}" not found!`);
                return;
            }

            const problem = templateFn.call(window.problemGenerator, original);

            if (!problem) {
                showError(`Template "${template}" returned null!`);
                return;
            }

            problemStats.total++;
            problemStats[problem.difficulty || 'easy']++;
            updateStats();

            displayProblem(problem, problemStats.total);

        } catch (error) {
            showError(`Error generating problem: ${error.message}`);
            console.error(error);
        }
    }

    function generateBatch() {
        const count = parseInt(document.getElementById('batchCount').value) || 10;
        for (let i = 0; i < count; i++) {
            if (currentMode === 'topic') {
                generateProblem();
            } else {
                generateTemplateMode();
            }
        }
    }

    function displayProblem(problem, num) {
        const container = document.getElementById('problemsContainer');

        const problemDiv = document.createElement('div');
        problemDiv.className = 'problem-display';

        const difficulty = (problem.difficulty || 'easy').toLowerCase();

        let html = `
            <div class="problem-header">
                <div class="problem-id">#${num} • ${problem.id}</div>
                <div class="difficulty-badge ${difficulty}">${difficulty.toUpperCase()}</div>
            </div>

            <div class="problem-question">${problem.question}</div>

            <div class="problem-choices">
        `;

        if (problem.choices && Array.isArray(problem.choices)) {
            problem.choices.forEach(choice => {
                const isCorrect = choice.startsWith(problem.answer + ')') || choice.startsWith(problem.answer + '.');
                const className = isCorrect ? 'choice correct' : 'choice';
                html += `<div class="${className}">${choice}</div>`;
            });
        }

        html += `</div>`;

        if (problem.answer) {
            html += `
                <div class="problem-answer">
                    <strong>✓ Correct Answer:</strong> ${problem.answer}
                </div>
            `;
        }

        if (problem.explanation) {
            html += `
                <div class="problem-explanation">
                    <strong>💡 Explanation:</strong><br>${problem.explanation}
                </div>
            `;
        }

        problemDiv.innerHTML = html;
        container.insertBefore(problemDiv, container.firstChild);
    }

    function updateStats() {
        document.getElementById('statGenerated').textContent = problemStats.total;
        document.getElementById('statEasy').textContent = problemStats.easy;
        document.getElementById('statMedium').textContent = problemStats.medium;
        document.getElementById('statHard').textContent = problemStats.hard;
    }

    function showError(message) {
        const container = document.getElementById('problemsContainer');
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error';
        errorDiv.textContent = '❌ ' + message;
        container.insertBefore(errorDiv, container.firstChild);

        setTimeout(() => errorDiv.remove(), 5000);
    }

    function clearResults() {
        document.getElementById('problemsContainer').innerHTML = '';
        problemStats = { total: 0, easy: 0, medium: 0, hard: 0 };
        updateStats();
    }

    // Event listeners
    document.getElementById('topicSelect').addEventListener('change', onTopicChange);
    document.getElementById('difficultySelect').addEventListener('change', onDifficultyChange);
    document.getElementById('templateTopicSelect').addEventListener('change', onTemplateTopicChange);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

        if (e.code === 'Space') {
            e.preventDefault();
            if (currentMode === 'topic') {
                generateProblem();
            } else {
                generateTemplateMode();
            }
        } else if (e.code === 'KeyB') {
            generateBatch();
        } else if (e.code === 'KeyC') {
            clearResults();
        } else if (e.code === 'KeyM') {
            setMode(currentMode === 'topic' ? 'template' : 'topic');
        }
    });
</script>
</body>
</html>
